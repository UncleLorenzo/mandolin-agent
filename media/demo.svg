<rect x="1" y="1" width="774" height="686" rx="13" fill="#0a0d12" stroke="#1b2230" stroke-width="1.5"/>
<circle class="dot" cx="26" cy="24" r="6" fill="#ff3d77"/>
<circle class="dot" cx="46" cy="24" r="6" fill="#e6c389"/>
<circle class="dot" cx="66" cy="24" r="6" fill="#39b8c4"/>
<text x="92" y="29" fill="#8b8b93" font-size="13" xml:space="preserve">mando act</text>
<text x="750" y="29" fill="#5b6068" font-size="13" text-anchor="end" xml:space="preserve">~/.mandolin</text>
<rect x="1" y="46" width="774" height="1.5" fill="url(#accent)" opacity="0.55"/>
<text x="26" y="102" class="l0" xml:space="preserve"><tspan fill="#39b8c4">mandolin  </tspan><tspan fill="#f3ecda">show me what's here</tspan></text>
<text x="26" y="128" class="l1" xml:space="preserve"><tspan fill="#8b8b93">  → </tspan><tspan fill="#efe7d6">list_dir </tspan><tspan fill="#5b6068">(read) · .</tspan></text>
<text x="26" y="154" class="l2" xml:space="preserve"><tspan fill="#39b8c4">  ✓ </tspan><tspan fill="#39b8c4">allowed</tspan><tspan fill="#8b8b93"> — reads inside your project are free</tspan></text>
<text x="26" y="206" class="l3" xml:space="preserve"><tspan fill="#39b8c4">mandolin  </tspan><tspan fill="#f3ecda">run something harmless</tspan></text>
<text x="26" y="232" class="l4" xml:space="preserve"><tspan fill="#8b8b93">  → </tspan><tspan fill="#efe7d6">run_shell </tspan><tspan fill="#e6c389">(exec) </tspan><tspan fill="#5b6068">· echo hello from your agent</tspan></text>
<text x="26" y="258" class="l5" xml:space="preserve"><tspan fill="#e6c389">  · </tspan><tspan fill="#8b8b93">needs approval        </tspan><tspan fill="#8b8b93">you ▸ </tspan><tspan fill="#39b8c4">allow</tspan></text>
<text x="26" y="284" class="l6" xml:space="preserve"><tspan fill="#39b8c4">  ✓ </tspan><tspan fill="#8b8b93">ran: </tspan><tspan fill="#efe7d6">hello from your agent</tspan></text>
<text x="26" y="336" class="l7" xml:space="preserve"><tspan fill="#39b8c4">mandolin  </tspan><tspan fill="#f3ecda">delete a directory</tspan></text>
<text x="26" y="362" class="l8" xml:space="preserve"><tspan fill="#8b8b93">  → </tspan><tspan fill="#efe7d6">run_shell </tspan><tspan fill="#e6c389">(exec) </tspan><tspan fill="#5b6068">· rm -rf ~/important-project</tspan></text>
<text x="26" y="388" class="l9" xml:space="preserve"><tspan fill="#e6c389">  · </tspan><tspan fill="#8b8b93">needs approval        </tspan><tspan fill="#8b8b93">you ▸ </tspan><tspan fill="#ff3d77">deny</tspan></text>
<text x="26" y="414" class="l10" xml:space="preserve"><tspan fill="#ff3d77">  ✗ </tspan><tspan fill="#ff3d77">blocked</tspan><tspan fill="#8b8b93"> — and logged to actions.md</tspan></text>
<text x="26" y="466" class="l11" xml:space="preserve"><tspan fill="#5b6068">most agents will run that last command.  </tspan><tspan fill="#f3ecda">Mandolin won't.</tspan></text>
<text x="26" y="518" class="l12" xml:space="preserve"><tspan fill="#8b8b93">— and the same gate guards every skill you import —</tspan></text>
<text x="26" y="570" class="l13" xml:space="preserve"><tspan fill="#efe7d6">mando import </tspan><tspan fill="#5b6068">community-hub/totally-legit-helper</tspan></text>
<text x="26" y="596" class="l14" xml:space="preserve"><tspan fill="#ff3d77">  ✗ </tspan><tspan fill="#ff3d77">DANGEROUS</tspan><tspan fill="#8b8b93"> · 6 findings · </tspan><tspan fill="#e6c389">quarantined in proposed/</tspan></text>
<text x="26" y="622" class="l15" xml:space="preserve"><tspan fill="#5b6068">    env | curl exfil · rm -rf · sudo · curl | bash</tspan></text>
<text x="26" y="648" class="l16" xml:space="preserve"><tspan fill="#5b6068">  their skills install trusted.  </tspan><tspan fill="#f3ecda">ours arrive scanned and inert.</tspan></text>
</svg>
