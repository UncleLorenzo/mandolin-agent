<svg xmlns="http://www.w3.org/2000/svg" width="776" height="844" viewBox="0 0 776 844" font-size="15" role="img" aria-label="Mandolin agent: the trust gate in action">
<defs>
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#39b8c4"/><stop offset="0.5" stop-color="#f3ecda"/><stop offset="1" stop-color="#ff8a3d"/>
</linearGradient>
<style>text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;font-size:15px}.dot{}@keyframes l0{0%{opacity:0}0.00%{opacity:0}3.57%{opacity:1}100%{opacity:1}}.l0{opacity:1;animation:l0 14s linear infinite}@keyframes l1{0%{opacity:0}2.43%{opacity:0}6.00%{opacity:1}100%{opacity:1}}.l1{opacity:1;animation:l1 14s linear infinite}@keyframes l2{0%{opacity:0}4.86%{opacity:0}8.43%{opacity:1}100%{opacity:1}}.l2{opacity:1;animation:l2 14s linear infinite}@keyframes l3{0%{opacity:0}7.29%{opacity:0}10.86%{opacity:1}100%{opacity:1}}.l3{opacity:1;animation:l3 14s linear infinite}@keyframes l4{0%{opacity:0}9.71%{opacity:0}13.29%{opacity:1}100%{opacity:1}}.l4{opacity:1;animation:l4 14s linear infinite}@keyframes l5{0%{opacity:0}12.14%{opacity:0}15.71%{opacity:1}100%{opacity:1}}.l5{opacity:1;animation:l5 14s linear infinite}@keyframes l6{0%{opacity:0}14.57%{opacity:0}18.14%{opacity:1}100%{opacity:1}}.l6{opacity:1;animation:l6 14s linear infinite}@keyframes l7{0%{opacity:0}17.00%{opacity:0}20.57%{opacity:1}100%{opacity:1}}.l7{opacity:1;animation:l7 14s linear infinite}@keyframes l8{0%{opacity:0}19.43%{opacity:0}23.00%{opacity:1}100%{opacity:1}}.l8{opacity:1;animation:l8 14s linear infinite}@keyframes l9{0%{opacity:0}21.86%{opacity:0}25.43%{opacity:1}100%{opacity:1}}.l9{opacity:1;animation:l9 14s linear infinite}@keyframes l10{0%{opacity:0}24.29%{opacity:0}27.86%{opacity:1}100%{opacity:1}}.l10{opacity:1;animation:l10 14s linear infinite}@keyframes l11{0%{opacity:0}26.71%{opacity:0}30.29%{opacity:1}100%{opacity:1}}.l11{opacity:1;animation:l11 14s linear infinite}@keyframes l12{0%{opacity:0}29.14%{opacity:0}32.71%{opacity:1}100%{opacity:1}}.l12{opacity:1;animation:l12 14s linear infinite}@keyframes l13{0%{opacity:0}31.57%{opacity:0}35.14%{opacity:1}100%{opacity:1}}.l13{opacity:1;animation:l13 14s linear infinite}@keyframes l14{0%{opacity:0}34.00%{opacity:0}37.57%{opacity:1}100%{opacity:1}}.l14{opacity:1;animation:l14 14s linear infinite}@keyframes l15{0%{opacity:0}36.43%{opacity:0}40.00%{opacity:1}100%{opacity:1}}.l15{opacity:1;animation:l15 14s linear infinite}@keyframes l16{0%{opacity:0}38.86%{opacity:0}42.43%{opacity:1}100%{opacity:1}}.l16{opacity:1;animation:l16 14s linear infinite}@keyframes l17{0%{opacity:0}41.29%{opacity:0}44.86%{opacity:1}100%{opacity:1}}.l17{opacity:1;animation:l17 14s linear infinite}@keyframes l18{0%{opacity:0}43.71%{opacity:0}47.29%{opacity:1}100%{opacity:1}}.l18{opacity:1;animation:l18 14s linear infinite}@keyframes l19{0%{opacity:0}46.14%{opacity:0}49.71%{opacity:1}100%{opacity:1}}.l19{opacity:1;animation:l19 14s linear infinite}@keyframes l20{0%{opacity:0}48.57%{opacity:0}52.14%{opacity:1}100%{opacity:1}}.l20{opacity:1;animation:l20 14s linear infinite}</style>
</defs>
<rect x="1" y="1" width="774" height="842" rx="13" fill="#0a0d12" stroke="#1b2230" stroke-width="1.5"/>
<circle class="dot" cx="26" cy="24" r="6" fill="#ff3d77"/>
<circle class="dot" cx="46" cy="24" r="6" fill="#e6c389"/>
<circle class="dot" cx="66" cy="24" r="6" fill="#39b8c4"/>
<text x="92" y="29" fill="#8b8b93" font-size="13" xml:space="preserve">mando act</text>
<text x="750" y="29" fill="#5b6068" font-size="13" text-anchor="end" xml:space="preserve">~/.mandolin</text>
<rect x="1" y="46" width="774" height="1.5" fill="url(#accent)" opacity="0.55"/>
<text x="26" y="102" class="l0" xml:space="preserve"><tspan fill="#39b8c4">mandolin  </tspan><tspan fill="#f3ecda">show me what's here</tspan></text>
<text x="26" y="128" class="l1" xml:space="preserve"><tspan fill="#8b8b93">  → </tspan><tspan fill="#efe7d6">list_dir </tspan><tspan fill="#5b6068">(read) · .</tspan></text>
<text x="26" y="154" class="l2" xml:space="preserve"><tspan fill="#39b8c4">  ✓ </tspan><tspan fill="#39b8c4">allowed</tspan><tspan fill="#8b8b93"> — reads inside your project are free</tspan></text>
<text x="26" y="206" class="l3" xml:space="preserve"><tspan fill="#39b8c4">mandolin  </tspan><tspan fill="#f3ecda">run something harmless</tspan></text>
<text x="26" y="232" class="l4" xml:space="preserve"><tspan fill="#8b8b93">  → </tspan><tspan fill="#efe7d6">run_shell </tspan><tspan fill="#e6c389">(exec) </tspan><tspan fill="#5b6068">· echo hello from your agent</tspan></text>
<text x="26" y="258" class="l5" xml:space="preserve"><tspan fill="#e6c389">  · </tspan><tspan fill="#8b8b93">needs approval        </tspan><tspan fill="#8b8b93">you ▸ </tspan><tspan fill="#39b8c4">allow</tspan></text>
<text x="26" y="284" class="l6" xml:space="preserve"><tspan fill="#39b8c4">  ✓ </tspan><tspan fill="#8b8b93">ran: </tspan><tspan fill="#efe7d6">hello from your agent</tspan></text>
<text x="26" y="336" class="l7" xml:space="preserve"><tspan fill="#39b8c4">mandolin  </tspan><tspan fill="#f3ecda">delete a directory</tspan></text>
<text x="26" y="362" class="l8" xml:space="preserve"><tspan fill="#8b8b93">  → </tspan><tspan fill="#efe7d6">run_shell </tspan><tspan fill="#e6c389">(exec) </tspan><tspan fill="#5b6068">· rm -rf ~/important-project</tspan></text>
<text x="26" y="388" class="l9" xml:space="preserve"><tspan fill="#e6c389">  · </tspan><tspan fill="#8b8b93">needs approval        </tspan><tspan fill="#8b8b93">you ▸ </tspan><tspan fill="#ff3d77">deny</tspan></text>
<text x="26" y="414" class="l10" xml:space="preserve"><tspan fill="#ff3d77">  ✗ </tspan><tspan fill="#ff3d77">blocked</tspan><tspan fill="#8b8b93"> — and logged to actions.md</tspan></text>
<text x="26" y="466" class="l11" xml:space="preserve"><tspan fill="#5b6068">most agents will run that last command.  </tspan><tspan fill="#f3ecda">Mandolin won't.</tspan></text>
<text x="26" y="518" class="l12" xml:space="preserve"><tspan fill="#8b8b93">— and the same gate guards every skill you import —</tspan></text>
<text x="26" y="570" class="l13" xml:space="preserve"><tspan fill="#efe7d6">mando import </tspan><tspan fill="#5b6068">community-hub/totally-legit-helper</tspan></text>
<text x="26" y="596" class="l14" xml:space="preserve"><tspan fill="#ff3d77">  ✗ </tspan><tspan fill="#ff3d77">DANGEROUS</tspan><tspan fill="#8b8b93"> · 6 findings · </tspan><tspan fill="#e6c389">quarantined in proposed/</tspan></text>
<text x="26" y="622" class="l15" xml:space="preserve"><tspan fill="#5b6068">    env | curl exfil · rm -rf · sudo · curl | bash</tspan></text>
<text x="26" y="648" class="l16" xml:space="preserve"><tspan fill="#5b6068">  their skills install trusted.  </tspan><tspan fill="#f3ecda">ours arrive scanned and inert.</tspan></text>
<text x="26" y="700" class="l17" xml:space="preserve"><tspan fill="#8b8b93">— and it recalls by meaning, not grep —</tspan></text>
<text x="26" y="752" class="l18" xml:space="preserve"><tspan fill="#efe7d6">mando recall </tspan><tspan fill="#5b6068">"how do we handle payments?"</tspan></text>
<text x="26" y="778" class="l19" xml:space="preserve"><tspan fill="#39b8c4">  → </tspan><tspan fill="#efe7d6">We integrate Stripe for subscriptions; invoices on the 1st.</tspan></text>
<text x="26" y="804" class="l20" xml:space="preserve"><tspan fill="#5b6068">    "payment" was never written — </tspan><tspan fill="#f3ecda">bridged by meaning.</tspan></text>
</svg>
