inear infinite}@keyframes l15{0%{opacity:0}44.35%{opacity:0}48.70%{opacity:1}100%{opacity:1}}.l15{opacity:1;animation:l15 11.5s linear infinite}@keyframes l16{0%{opacity:0}47.30%{opacity:0}51.65%{opacity:1}100%{opacity:1}}.l16{opacity:1;animation:l16 11.5s linear infinite}</style>
